<!-- navbar.html (CRM Premium Sidebar) -->
<style>
    /* ========================================================
       SIDEBAR — COSMIC NOIR STYLING
       ======================================================== */
    .crm-sidebar {
        width: 280px;
        height: 100vh;
        position: fixed;
        top: 0;
        left: 0;
        background: var(--gradient-sidebar);
        border-right: 1px solid var(--border-default);
        display: flex;
        flex-direction: column;
        z-index: 1005;
        transition: transform var(--duration-normal) var(--ease-out-expo);
        padding: 2rem 1.5rem;
    }

    /* Backdrop for Mobile */
    .sidebar-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(3, 7, 18, 0.6);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        z-index: 1004;
        opacity: 0;
        pointer-events: none;
        transition: opacity var(--duration-normal) ease;
    }
    
    .sidebar-backdrop.active {
        opacity: 1;
        pointer-events: auto;
    }

    /* Sidebar Logo/Header */
    .sidebar-brand {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        text-decoration: none !important;
        margin-bottom: 2.5rem;
        padding: 0 0.5rem;
        transition: opacity var(--duration-fast) ease;
    }

    .sidebar-brand:hover {
        opacity: 0.9;
    }

    .sidebar-brand-icon {
        width: 38px;
        height: 38px;
        border-radius: 10px;
        background: var(--gradient-primary);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.15rem;
        font-weight: 800;
        color: #fff;
        box-shadow: var(--shadow-glow-cyan);
        position: relative;
        overflow: hidden;
    }

    .sidebar-brand-icon::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 60%);
    }

    .sidebar-brand-text {
        font-weight: 800;
        font-size: 1.25rem;
        letter-spacing: -0.04em;
        background: var(--gradient-text);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    /* Profile Section */
    .sidebar-profile {
        background: rgba(255, 255, 255, 0.015);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        padding: 1rem 1.1rem;
        margin-bottom: 2rem;
        display: flex;
        align-items: center;
        gap: 0.85rem;
        position: relative;
        overflow: hidden;
    }

    .sidebar-profile::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 3px;
        height: 100%;
        background: var(--gradient-primary);
    }

    .sidebar-avatar {
        width: 42px;
        height: 42px;
        border-radius: 10px;
        background: rgba(13, 148, 136, 0.15);
        border: 1px solid rgba(13, 148, 136, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.15rem;
        color: var(--accent-cyan);
    }

    .sidebar-profile-info {
        display: flex;
        flex-direction: column;
        min-width: 0;
    }

    .sidebar-username {
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--text-primary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .sidebar-badge {
        font-size: 0.72rem;
        font-weight: 600;
        color: var(--accent-cyan);
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
        margin-top: 0.1rem;
    }

    .sidebar-badge::before {
        content: '';
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--accent-cyan);
        animation: pulse-ring 2s ease-in-out infinite;
    }

    /* Menu Items */
    .sidebar-menu {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
    }

    .sidebar-menu-title {
        font-size: 0.72rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-muted);
        margin-bottom: 0.6rem;
        margin-top: 1rem;
        padding: 0 0.5rem;
    }

    .sidebar-menu-item {
        position: relative;
    }

    .sidebar-menu-link {
        display: flex;
        align-items: center;
        gap: 0.85rem;
        padding: 0.75rem 1rem;
        color: var(--text-secondary) !important;
        text-decoration: none !important;
        font-size: 0.92rem;
        font-weight: 500;
        border-radius: var(--radius-sm);
        transition: all var(--duration-fast) ease;
    }

    .sidebar-menu-link:hover {
        color: var(--text-primary) !important;
        background: rgba(13, 148, 136, 0.06);
    }

    .sidebar-menu-item.active .sidebar-menu-link {
        color: #ffffff !important;
        background: rgba(13, 148, 136, 0.12);
        font-weight: 600;
        box-shadow: inset 2px 0 0 var(--accent-cyan);
    }

    .sidebar-menu-link svg {
        width: 18px;
        height: 18px;
        transition: transform var(--duration-fast) ease;
    }

    .sidebar-menu-link:hover svg {
        transform: scale(1.1);
        color: var(--accent-cyan);
    }

    /* Action buttons in sidebar */
    .sidebar-action-btn {
        margin-top: 1.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        padding: 0.7rem 1rem;
        background: var(--gradient-primary);
        border: none;
        border-radius: var(--radius-sm);
        color: #fff !important;
        font-size: 0.85rem;
        font-weight: 600;
        text-decoration: none !important;
        transition: all var(--duration-normal) var(--ease-out-expo);
        box-shadow: var(--shadow-glow-teal);
    }

    .sidebar-action-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(13, 148, 136, 0.35);
    }

    /* Footer Section */
    .sidebar-footer {
        margin-top: auto;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border-subtle);
    }

    .sidebar-logout-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.6rem;
        padding: 0.7rem 1rem;
        background: rgba(244, 63, 94, 0.05);
        border: 1px solid rgba(244, 63, 94, 0.15);
        color: #fb7185 !important;
        text-decoration: none !important;
        font-size: 0.85rem;
        font-weight: 600;
        border-radius: var(--radius-sm);
        transition: all var(--duration-normal) var(--ease-out-expo);
    }

    .sidebar-logout-btn:hover {
        background: rgba(244, 63, 94, 0.12);
        color: #fda4af !important;
        transform: translateY(-1px);
        box-shadow: 0 4px 16px rgba(244, 63, 94, 0.15);
    }

    /* Responsive */
    @media (max-width: 991px) {
        .crm-sidebar {
            transform: translateX(-280px);
        }
        .crm-sidebar.active {
            transform: translateX(0);
            box-shadow: var(--shadow-lg), 0 0 40px rgba(0, 0, 0, 0.8);
        }
    }
</style>

<div class="sidebar-backdrop d-lg-none"></div>

<aside class="crm-sidebar">
    <!-- Brand -->
    <a class="sidebar-brand spa-link" href="{% url 'home' %}">
        <div class="sidebar-brand-icon">⚡</div>
        <span class="sidebar-brand-text">CRM PRO</span>
    </a>

    <!-- Profile Info -->
    <div class="sidebar-profile">
        <div class="sidebar-avatar">👤</div>
        <div class="sidebar-profile-info">
            <span class="sidebar-username">{{ user.username }}</span>
            <span class="sidebar-badge">En línea</span>
        </div>
    </div>

    <!-- Main Navigation Menu -->
    <div class="sidebar-menu-title">Navegación</div>
    <ul class="sidebar-menu">
        <li class="sidebar-menu-item {% if request.resolver_match.url_name == 'home' or 'website' in request.resolver_match.namespaces %}active{% endif %}">
            <a class="sidebar-menu-link spa-link" href="{% url 'home' %}">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
                </svg>
                <span>Registros CRM</span>
            </a>
        </li>
        <li class="sidebar-menu-item {% if 'componentes' in request.path %}active{% endif %}">
            <a class="sidebar-menu-link spa-link" href="{% url 'componentes_list' %}">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"/>
                </svg>
                <span>Componentes</span>
            </a>
        </li>
    </ul>

    <!-- Quick Actions -->
    <div class="sidebar-menu-title">Accesos Rápidos</div>
    <ul class="sidebar-menu">
        <li>
            <a class="sidebar-menu-link spa-link" href="{% url 'add_record' %}" style="padding: 0.5rem 1rem; font-size: 0.85rem;">
                <span style="color: var(--accent-emerald); font-weight: 700; margin-right: 0.35rem;">+</span> Registrar Contacto
            </a>
        </li>
        <li>
            <a class="sidebar-menu-link spa-link" href="{% url 'componente_create' %}" style="padding: 0.5rem 1rem; font-size: 0.85rem;">
                <span style="color: var(--accent-cyan); font-weight: 700; margin-right: 0.35rem;">+</span> Registrar Componente
            </a>
        </li>
    </ul>

    <!-- Footer Action -->
    <div class="sidebar-footer">
        <a class="sidebar-logout-btn" href="{% url 'logout' %}">
            <span>Cerrar Sesión</span> ✕
        </a>
    </div>
</aside>
