{% extends 'base.html' %}

{% block content %}
<style>
    /* ========================================================
        UPDATE RECORD — PREMIUM FORM CARD STYLING
       ======================================================== */

    .form-scene {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 1.5rem 0.5rem;
        position: relative;
        width: 100%;
    }

    .form-scene::before {
        content: '';
        position: absolute;
        width: 450px;
        height: 450px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(245, 158, 11, 0.04) 0%, transparent 70%);
        top: -120px;
        left: -80px;
        pointer-events: none;
    }

    .form-card {
        width: 100%;
        max-width: 620px;
        background: rgba(11, 15, 25, 0.45);
        border: 1px solid var(--border-default);
        border-radius: var(--radius-lg);
        overflow: hidden;
        position: relative;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        animation: fadeInScale 0.5s var(--ease-spring) both;
        box-shadow: var(--shadow-lg), 0 10px 40px rgba(0, 0, 0, 0.6);
    }

    /* Top gradient stripe — amber/yellow for edit */
    .form-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, #f59e0b 0%, #d97706 100%);
    }

    /* Card Header */
    .form-card-header {
        padding: 2.5rem 2.5rem 0;
        text-align: center;
    }

    .form-icon-wrap {
        width: 64px;
        height: 64px;
        border-radius: var(--radius-md);
        background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 1.6rem;
        margin-bottom: 1rem;
        box-shadow: 0 8px 24px rgba(245, 158, 11, 0.25);
        position: relative;
        overflow: hidden;
    }

    .form-icon-wrap::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.2) 0%, transparent 60%);
    }

    .form-card-header h1 {
        font-size: 1.8rem;
        font-weight: 800;
        letter-spacing: -0.03em;
        background: linear-gradient(135deg, #f8fafc 0%, #fbbf24 60%, #d97706 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 0.3rem;
    }

    .form-card-header p {
        font-size: 0.92rem;
        color: var(--text-secondary);
    }

    /* Card Body */
    .form-card-body {
        padding: 2rem 2.5rem 2.5rem;
    }

    /* Form Fields Styling */
    .form-card form p {
        margin-bottom: 1.25rem;
    }

    .form-card form label {
        display: block;
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 0.45rem;
    }

    .form-card form .form-control {
        width: 100%;
        background: rgba(255, 255, 255, 0.02) !important;
        border: 1px solid var(--border-default) !important;
        border-radius: var(--radius-md) !important;
        color: var(--text-primary) !important;
        font-family: var(--font-main);
        font-size: 0.95rem;
        padding: 0.85rem 1.1rem !important;
        transition: all var(--duration-normal) var(--ease-out-expo);
        outline: none !important;
    }

    .form-card form .form-control:focus {
        border-color: #f59e0b !important;
        box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.08), 0 4px 16px rgba(0, 0, 0, 0.2) !important;
        background: rgba(245, 158, 11, 0.02) !important;
    }

    .form-card form .form-control::placeholder {
        color: var(--text-muted) !important;
    }

    /* Help text styling */
    .form-card form .form-text {
        font-size: 0.75rem;
        color: var(--text-muted) !important;
        margin-top: 0.35rem;
        display: block;
    }

    /* Submit Button — Amber */
    .form-card button[type="submit"] {
        width: 100%;
        background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%) !important;
        color: #fff !important;
        border: none !important;
        padding: 0.95rem 2rem !important;
        font-size: 0.95rem !important;
        font-weight: 700 !important;
        border-radius: var(--radius-md) !important;
        cursor: pointer;
        transition: all var(--duration-normal) var(--ease-out-expo) !important;
        margin-top: 0.75rem;
        position: relative;
        overflow: hidden;
        box-shadow: 0 4px 20px rgba(245, 158, 11, 0.25);
    }

    .form-card button[type="submit"]::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, transparent 60%);
        opacity: 0;
        transition: opacity var(--duration-fast) ease;
    }

    .form-card button[type="submit"]:hover {
        transform: translateY(-2px) !important;
        box-shadow: 0 12px 35px rgba(245, 158, 11, 0.35), 0 0 30px rgba(245, 158, 11, 0.15) !important;
    }

    .form-card button[type="submit"]:hover::before {
        opacity: 1;
    }

    .form-card button[type="submit"]:active {
        transform: translateY(0) !important;
    }

    /* Footer */
    .form-footer {
        text-align: center;
        margin-top: 1.5rem;
        padding-top: 1.25rem;
        border-top: 1px solid var(--border-subtle);
    }

    .form-footer a {
        color: var(--text-secondary);
        font-weight: 600;
        text-decoration: none;
        transition: color var(--duration-fast) ease;
        font-size: 0.88rem;
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
    }

    .form-footer a:hover {
        color: #fbbf24;
    }

    .form-footer a svg {
        width: 16px;
        height: 16px;
    }

    @media (max-width: 600px) {

        .form-card-header,
        .form-card-body {
            padding-left: 1.5rem;
            padding-right: 1.5rem;
        }
    }
</style>

<div class="form-scene">
    <div class="form-card">
        <div class="form-card-header">
            <div class="form-icon-wrap">✏️</div>
            <h1>Editar Contacto</h1>
            <p>Modifica los campos del registro y guarda los cambios</p>
        </div>

        <div class="form-card-body">
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}

                <button type="submit">
                    Guardar Cambios →
                </button>
            </form>

            <div class="form-footer">
                <a href="{% url 'record' customer_record.id %}">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                    Cancelar y Volver al Detalle
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
